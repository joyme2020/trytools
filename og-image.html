<!DOCTYPE html>
<html><head><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1200px;height:630px;background:linear-gradient(135deg,#6366f1 0%,#8b5cf6 100%);display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
.card{text-align:center;padding:60px}
.icon{font-size:120px;line-height:1;margin-bottom:20px}
.title{font-size:64px;font-weight:800;color:#fff;letter-spacing:-1px;margin-bottom:12px}
.sub{font-size:28px;color:rgba(255,255,255,0.8);font-weight:400}
.url{font-size:22px;color:rgba(255,255,255,0.5);margin-top:30px}
</style></head><body>
<div class="card">
  <div class="icon">&#x1F6E0;</div>
  <div class="title">TryTools</div>
  <div class="sub">Free browser-side developer tools<br>No tracking, no uploads, no signup</div>
  <div class="url">trytools.app</div>
</div>

<script>
function toggleTheme() {
  var el = document.documentElement;
  var next = el.getAttribute('data-theme') === 'dark' ? '' : 'dark';
  el.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  updateThemeIcon();
}
function updateThemeIcon() {
  var btn = document.querySelector('.theme-toggle');
  if (btn) btn.textContent = document.documentElement.getAttribute('data-theme') === 'dark' ? '☀️' : '🌙';
}
(function(){
  var saved = localStorage.getItem('theme');
  if (saved === 'dark' || (!saved && matchMedia('(prefers-color-scheme:dark)').matches)) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }
  updateThemeIcon();
})();
</script>
</body></html>
